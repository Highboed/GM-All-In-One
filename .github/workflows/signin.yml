name: 'GameMale Auto Sign-in'

on:
  schedule:
    - cron: '0 1,13 * * *' # 每天北京时间 09:00 和 21:00 自动运行
  workflow_dispatch: # 必须保留：允许在 GitHub 界面手动点击运行测试

jobs:
  signin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests ddddocr

          # 补充说明：ddddocr 依赖较重，在 Ubuntu 虚拟机中初次安装需要大约 10-14 秒

      - name: Run Task Script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python gamemale.py
